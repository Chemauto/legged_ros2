rl_controller:
  ros__parameters:
    update_rate: 50 # Hz
    joint_names: [
      'FL_hip_joint', 
      'FR_hip_joint', 
      'RL_hip_joint', 
      'RR_hip_joint', 
      'FL_thigh_joint', 
      'FR_thigh_joint', 
      'RL_thigh_joint', 
      'RR_thigh_joint', 
      'FL_calf_joint', 
      'FR_calf_joint', 
      'RL_calf_joint', 
      'RR_calf_joint'
    ]
    imu_names: # only use one imu for RL observation
      - imu # refer to ros2 control xacro file
    cmd_vel_topic: "cmd_vel"
    cmd_vel_range_lin_vel_x: [-1.0, 1.0]  # m/s
    cmd_vel_range_lin_vel_y: [-1.0, 1.0]  # m/s
    cmd_vel_range_ang_vel_z: [-3.14, 3.14]  # rad/s

    