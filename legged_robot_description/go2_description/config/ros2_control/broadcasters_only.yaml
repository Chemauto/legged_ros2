controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    imu_state_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

joint_state_broadcaster:
  ros__parameters:
    update_rate: 250
    joints: [
      'FL_hip_joint',
      'FL_thigh_joint',
      'FL_calf_joint',
      'FR_hip_joint',
      'FR_thigh_joint',
      'FR_calf_joint',
      'RL_hip_joint',
      'RL_thigh_joint',
      'RL_calf_joint',
      'RR_hip_joint',
      'RR_thigh_joint',
      'RR_calf_joint'
    ]
    interfaces:
      - position
      - velocity
      - effort
      - position_des
      - velocity_des

imu_state_broadcaster:
  ros__parameters:
    sensor_name: "imu"
    frame_id: "imu_link"
